<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peine Vro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      border: 2px solid white;
      padding: 25px;
      border-radius: 12px;
      width: 300px;
    }

    h1 {
      font-size: 3rem;
      margin: 0 0 10px 0;
    }

    p {
      font-size: 1.1rem;
      opacity: 0.85;
      margin: 10px 0;
    }

    .counter {
      margin-top: 15px;
      font-size: 1.2rem;
      color: #00ffcc;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>Peine Vro 🪮</h1>

    <p>Un peine auténtico.</p>

    <p>Ahvo quien más si no oskar nitas</p>

    <div class="counter">
      Scans: <span id="scans">0</span>
    </div>
  </div>

  <script>
    let scans = localStorage.getItem("scans");

    if (!scans) {
      scans = 0;
    }

    scans++;
    localStorage.setItem("scans", scans);

    document.getElementById("scans").textContent = scans;
  </script>
</body>
</html>
